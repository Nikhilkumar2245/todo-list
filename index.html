<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2 style="text-align: center; margin-bottom: 20px; margin-top: 30px;">TO-DO List</h2>

    <input
        id="taskInput"
        type="text"
        placeholder="Enter Task..."
    >

    <button
        id="addBtn"
    >
        Add Task
    </button>

    <button
        id="clearBtn"
    >
        Clear All Tasks
    </button>

    <ul id="taskList"></ul>

    <script src="script.js"></script>
</body>
</html>
